name: OmicsFlow CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Lint Nextflow syntax ─────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Nextflow
        run: |
          wget -qO- https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -version

      - name: Validate RNA-seq pipeline
        run: nextflow run workflows/rnaseq.nf --help || true

      - name: Validate Long-read pipeline
        run: nextflow run workflows/longread.nf --help || true

      - name: Validate Metagenomics pipeline
        run: nextflow run workflows/metagenomics.nf --help || true

  # ── Stub test (no Docker required, tests pipeline logic) ─────────────────
  stub-test:
    name: Stub test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Nextflow
        run: |
          wget -qO- https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      - name: Run RNA-seq stub test
        run: |
          nextflow run workflows/rnaseq.nf \
            -profile stub \
            --input data/test/samplesheet.csv \
            --outdir results_ci \
            -stub-run

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-results
          path: results_ci/

  # ── Docker build ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: stub-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t omicsflow:test containers/

      - name: Test container
        run: |
          docker run --rm omicsflow:test fastqc --version
          docker run --rm omicsflow:test samtools --version
          docker run --rm omicsflow:test salmon --version

      - name: Push to Docker Hub (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag omicsflow:test ${{ secrets.DOCKER_USERNAME }}/omicsflow:latest
          docker tag omicsflow:test ${{ secrets.DOCKER_USERNAME }}/omicsflow:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/omicsflow:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/omicsflow:${{ github.sha }}
